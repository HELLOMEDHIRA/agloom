name: Feature Request
description: Suggest a new feature or improvement for agloom
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include API examples if possible.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of agloom does this relate to?
      options:
        - Patterns (execution strategies)
        - Memory (session / long-term)
        - Skills (learning / registry)
        - Feedback (evaluation / trends)
        - Streaming / Events
        - Configuration / API
        - Performance / Scalability
        - Documentation
        - Other
    validations:
      required: true
