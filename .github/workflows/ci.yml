name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Ruff lint
        run: uv run ruff check agloom

      - name: Ruff format check
        run: uv run ruff format --check agloom

      - name: Type check (pyrefly)
        run: uv run pyrefly check agloom

      - name: Markdown lint
        run: npx --yes markdownlint-cli2

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run tests
        run: uv run pytest -q

  # TypeScript AGP clients — catalog sync and wire-parse tests (no lockfiles; npm install).
  frontend:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [agloom_cli, agloom_web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          npm install
          npm test
