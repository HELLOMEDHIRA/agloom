site_name: agloom
site_url: https://agloom.readthedocs.io
site_description: "agloom — Weave intelligent agents from 9 execution patterns. Built by MEDHIRA."
site_author: MEDHIRA
repo_url: https://github.com/HELLOMEDHIRA/agloom
repo_name: HELLOMEDHIRA/agloom
edit_uri: edit/main/docs/
copyright: "&copy; 2026 MEDHIRA"

theme:
  name: material
  logo: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  favicon: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

# Package docs are copied to docs/_packages/<name>/ before build; nav paths mirror that layout.
nav:
  - Home: index.md
  - agloom CLI:
      - Quick Start: _packages/agloom_cli/index.md
      - Developer reference (AGP / I/O): _packages/agloom_cli/reference.md
      - Smart Context: _packages/agloom_cli/smart-context.md
  - Python package:
      - Overview: _packages/agloom/index.md
      - Why agloom?: _packages/agloom/getting-started/why-agloom.md
      - Installation: _packages/agloom/getting-started/installation.md
      - Quick Start (API): _packages/agloom/getting-started/quickstart.md
      - Requirements: _packages/agloom/getting-started/requirements.md
  - Core Concepts:
      - How It Works: _packages/agloom/concepts/how-it-works.md
      - Execution Patterns: _packages/agloom/concepts/patterns.md
      - The create_agent API: _packages/agloom/concepts/create-agent.md
  - Features:
      - Tool Calling: _packages/agloom/features/tools.md
      - Memory: _packages/agloom/features/memory.md
      - Skill Learning: _packages/agloom/features/skills.md
      - Feedback & Evaluation: _packages/agloom/features/feedback.md
      - Streaming & Events: _packages/agloom/features/streaming.md
      - Human-in-the-Loop: _packages/agloom/features/hitl.md
      - Middleware: _packages/agloom/features/middleware.md
      - MCP Servers: _packages/agloom/features/mcp.md
      - Frozen Agents: _packages/agloom/features/frozen-agents.md
      - Task Delegation: _packages/agloom/features/delegation.md
      - Long-running harness: _packages/agloom/features/harness.md
      - Observability & LangSmith: _packages/agloom/features/observability.md
  - Configuration:
      - All Parameters: _packages/agloom/configuration/parameters.md
      - Timeouts & Retries: _packages/agloom/configuration/reliability.md
      - Logging & Debug: _packages/agloom/configuration/logging.md
      - Errors & Warnings: _packages/agloom/configuration/errors.md
  - Protocol (experimental):
      - "AGP — Agloom Protocol": _packages/agloom/protocol/agp.md
  - Guides:
      - Production Integration: _packages/agloom/guides/production.md
  - Examples:
      - Python examples (repo): _packages/agloom/examples/python-examples.md
  - Architecture:
      - Runtime (Python bridge): _packages/agloom/runtime/architecture.md
      - Observability backend: _packages/agloom/observability/architecture.md
      - Web UI overview: _packages/agloom_web/index.md
      - Web UI architecture: _packages/agloom_web/architecture.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HELLOMEDHIRA/agloom
    - icon: fontawesome/brands/python
      link: https://pypi.org/user/HELLOMEDHIRA/
